name: docker-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run tests
        run: ./gradlew --no-daemon test

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != '' }}
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_REPOSITORY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      IMAGE_TAG: sha-${{ github.sha }}
      APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
      HONEYBADGER_API_KEY: ${{ secrets.HONEYBADGER_API_KEY }}
      HONEYBADGER_ENVIRONMENT: ${{ secrets.HONEYBADGER_ENVIRONMENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment manifest
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: docker-compose.yaml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          envs: IMAGE_REPOSITORY,IMAGE_TAG,APP_ENV_FILE,HONEYBADGER_API_KEY,HONEYBADGER_ENVIRONMENT
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            printf '%s\n' "$APP_ENV_FILE" > .env
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
            export IMAGE_NAME="$IMAGE_REPOSITORY"
            export IMAGE_TAG="$IMAGE_TAG"
            export HONEYBADGER_API_KEY="$HONEYBADGER_API_KEY"
            export HONEYBADGER_ENVIRONMENT="${HONEYBADGER_ENVIRONMENT:-production}"
            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Notify Honeybadger about deployment
        if: ${{ secrets.HONEYBADGER_API_KEY != '' }}
        run: |
          curl --fail --silent --show-error https://api.honeybadger.io/v1/deploys \
            -H "X-API-Key: ${{ secrets.HONEYBADGER_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            -d '{
              "deploy": {
                "environment": "'"${HONEYBADGER_ENVIRONMENT:-production}"'",
                "local_username": "github-actions",
                "revision": "${{ github.sha }}",
                "repository": "https://github.com/${{ github.repository }}"
              }
            }'
