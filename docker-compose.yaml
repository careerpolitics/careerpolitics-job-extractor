services:
  app:
    image: ${IMAGE_NAME:-ghcr.io/careerpolitics/careerpolitics-job-extractor}:${IMAGE_TAG:-latest}
    container_name: careerpolitics-trending-service
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SELENIUM_REMOTE_URL: ${SELENIUM_REMOTE_URL:-http://selenium:4444/wd/hub}
      APP_VERSION: ${IMAGE_TAG:-latest}
      HONEYBADGER_ENABLED: ${HONEYBADGER_ENABLED:-false}
      HONEYBADGER_API_KEY: ${HONEYBADGER_API_KEY:-}
      HONEYBADGER_ENVIRONMENT: ${HONEYBADGER_ENVIRONMENT:-production}
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=70.0
        -XX:InitialRAMPercentage=25.0
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
    depends_on:
      - selenium
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          memory: 384M

  selenium:
    image: ${SELENIUM_IMAGE:-selenium/standalone-chrome:latest}
    container_name: careerpolitics-selenium
    restart: unless-stopped
    ports:
      - "${SELENIUM_HOST_BIND:-127.0.0.1}:4444:4444"
      - "${SELENIUM_VNC_HOST_BIND:-127.0.0.1}:7900:7900"
    shm_size: 1g
    environment:
      SE_VNC_NO_PASSWORD: 1
      SE_NODE_MAX_SESSIONS: 1
      SE_NODE_OVERRIDE_MAX_SESSIONS: false
      SE_SESSION_REQUEST_TIMEOUT: 120
      SE_JAVA_OPTS: -Xmx512m
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 512M
