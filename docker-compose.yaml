services:
  app:
    image: muraridevv/careerpolitics-trending-service:1.0-SNAPSHOT
    container_name: careerpolitics-trending-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=70.0
        -XX:InitialRAMPercentage=25.0
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          memory: 384M
