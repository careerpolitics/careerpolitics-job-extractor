name: careerpolitics-job-extractor
region: blr
services:
  - name: api
    environment_slug: docker
    source_dir: /
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /actuator/health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    envs:
      - key: JAVA_TOOL_OPTIONS
        scope: RUN_AND_BUILD_TIME
        value: "-Xms256m -Xmx768m"
      - key: SPRING_PROFILES_ACTIVE
        scope: RUN_TIME
        value: prod
      - key: OPENROUTER_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CAREERPOLITICS_ARTICLE_API_URL
        scope: RUN_TIME
        type: SECRET
      - key: CAREERPOLITICS_ARTICLE_API_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: SELENIUM_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: SELENIUM_NEWS_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: SELENIUM_HEADLESS
        scope: RUN_TIME
        value: "true"
      - key: SELENIUM_MAX_ATTEMPTS
        scope: RUN_TIME
        value: "3"
      - key: TRENDS_SCHEDULER_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: TRENDS_SCHEDULER_CRON
        scope: RUN_TIME
        value: "0 0 * * * *"
      - key: TRENDS_SCHEDULER_PUBLISH
        scope: RUN_TIME
        value: "true"
      - key: TRENDS_SCHEDULER_TREND_COOLDOWN_HOURS
        scope: RUN_TIME
        value: "48"
      - key: SELENIUM_TIMEOUT_SECONDS
        scope: RUN_TIME
        value: "25"
      - key: SELENIUM_MANUAL_VERIFICATION_WAIT_ENABLED
        scope: RUN_TIME
        value: "false"
      - key: PORT
        scope: RUN_TIME
        value: "8080"

