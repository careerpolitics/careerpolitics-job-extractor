spring:
  application:
    name: careerpolitics-scraper

  datasource:
    url: jdbc:h2:file:./data/careerpoliticsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update   # creates/updates schema automatically
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      continue-on-error: true
      data-locations: classpath:data.sql
      defer-datasource-initialization: true   # 🚀 important: run data.sql after Hibernate

# CareerPolitics Configuration
careerpolitics:
  scraper:
    base-url: https://www.sarkariexam.com
    batch-size: 5
    delay-ms: 1000
    max-retries: 3
    timeout-ms: 10000
    user-agent: CareerPolitics-Scraper/1.0
  storage:
    s3-bucket: careerpolitics-job-images
    image-quality: 85
    max-image-size-kb: 500
  content:
    google-trends-url: https://trends.google.com/trending
    google-search-url: https://www.google.com/search
    youtube-rss-url: https://www.youtube.com/feeds/videos.xml
    selenium:
      enabled: ${SELENIUM_ENABLED:true}
      news-enabled: ${SELENIUM_NEWS_ENABLED:true}
      headless: ${SELENIUM_HEADLESS:false}
      manual-verification-wait-enabled: ${SELENIUM_MANUAL_VERIFICATION_WAIT_ENABLED:true}
      manual-verification-max-wait-seconds: ${SELENIUM_MANUAL_VERIFICATION_MAX_WAIT_SECONDS:180}
      timeout-seconds: ${SELENIUM_TIMEOUT_SECONDS:20}
      max-attempts: ${SELENIUM_MAX_ATTEMPTS:5}
      proxy-pool: ${SELENIUM_PROXY_POOL:}
      persistent-profile-enabled: ${SELENIUM_PERSISTENT_PROFILE_ENABLED:false}
      user-data-dir: ${SELENIUM_USER_DATA_DIR:profile}
    ai:
      openrouter:
        base-url: https://openrouter.ai/api/v1
        model: anthropic/claude-3.5-sonnet
        api-key: ${OPENROUTER_API_KEY:}
    article-api:
      url: ${CAREERPOLITICS_ARTICLE_API_URL:}
      token: ${CAREERPOLITICS_ARTICLE_API_TOKEN:}

# API Documentation
api:
  title: CareerPolitics Job Scraper API
  description: REST API for government job scraping and management
  version: 1.0.0
  contact:
    name: CareerPolitics Team
    email: support@careerpolitics.com
    url: https://careerpolitics.com

# Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health, metrics, info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# Logging
logging:
  level:
    com.careerpolitics: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  file:
    name: logs/careerpolitics-scraper.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: ${PORT:8080}
